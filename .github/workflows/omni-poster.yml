name: omni-poster

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (best-effort)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache state
        uses: actions/cache@v4
        with:
          path: .state
          key: omniposter-state-${{ github.ref_name }}
          restore-keys: |
            omniposter-state-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_DEFAULT_URL: ${{ secrets.WEBHOOK_DEFAULT_URL }}
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          VK_USER_ACCESS_TOKEN: ${{ secrets.VK_USER_ACCESS_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_GRAPH_VERSION: ${{ secrets.IG_GRAPH_VERSION }}
          MAX_API_TOKEN: ${{ secrets.MAX_API_TOKEN }}
          MAX_API_BASE: ${{ secrets.MAX_API_BASE }}
        run: |
          python -m omniposter run --posts ./posts
          python -m omniposter run --posts ./posts/my_avto5 --state ./.state/my_avto5.json
          python -m omniposter run --posts ./posts/my_avto_optimal --state ./.state/my_avto_optimal.json
          python -m omniposter tg-sync --source @MY_Avto5 --offset-state ./.state/tg_offset_my_avto5.json --seen-state ./.state/tg_seen_my_avto5.json
          python -m omniposter tg-sync --source @My_Avto_Optimal --offset-state ./.state/tg_offset_my_avto_optimal.json --seen-state ./.state/tg_seen_my_avto_optimal.json
